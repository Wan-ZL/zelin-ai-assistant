[smells]
mode = "comment"

[[source]]
name = "default"
default = true


[[plugin]]
name = "actionlint"

[[plugin]]
name = "bandit"

[[plugin]]
name = "radarlint-python"
mode = "comment"

[[plugin]]
name = "ripgrep"
mode = "comment"

[[plugin]]
name = "ruff"

[[plugin]]
name = "shellcheck"

[[plugin]]
name = "trivy"
# pinned: the plugin's known_good tag (0.67.2) 404s on GitHub releases
version = "0.72.0"
drivers = [
  "config",
]

[[plugin]]
name = "trufflehog"

[[plugin]]
name = "zizmor"

# --------------------------------------------------------------------------
# Triaged rule ignores — every block carries its reason (chore/qlty-cleanup).
# --------------------------------------------------------------------------

# bandit audits production code. Tests deliberately hardcode fake tokens
# ("xoxp-test"), /tmp fixture path strings, parse self-generated XML, and
# drive the CLI under test through subprocess — all by design. trufflehog
# still scans tests for real secrets.
[[ignore]]
file_patterns = ["tests/**"]
plugins = ["bandit"]

# Shelling out (claude CLI, osascript, git, open, ffmpeg) IS this product's
# core mechanism — a local orchestrator daemon. Call sites use list argv with
# shell=False and were individually reviewed in the v0.33.1 whole-repo audit
# (PR #49). B404 (import subprocess) and B603 (subprocess without shell) flag
# every use unconditionally, so they are pure noise here.
[[ignore]]
rules = ["bandit:B404", "bandit:B603"]

# Tools are resolved from PATH on purpose: user machines have homebrew /
# system / pyenv layouts, and a hardcoded absolute path broke real installs
# before (ffmpeg, PR #42).
[[ignore]]
rules = ["bandit:B607"]

# try/except/pass|continue is the documented best-effort idiom in the
# daemons: one bad record or a missing optional tool must never crash a
# radar/sync loop. Sites were reviewed in the v0.33.1 whole-repo audit.
[[ignore]]
rules = ["bandit:B110", "bandit:B112"]
