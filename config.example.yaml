# Zelin's AI Assistant 配置模板 — copy 为 config.yaml 并按自己环境填写（config.yaml 不入库）
owner:
  name: Your Name
  slack_user_id: U01234ABCDE          # 审批 DM 发到这里（换成你自己的 Slack user id）
  display_name: "Zelin's AI Assistant"

# 凭证说明（CONTRACT §19）：token/密码路径字段都可省略——推荐直接在 App 设置窗口
# 粘贴保存（写入 config/secrets/，目录 0700/文件 0600）。解析顺序：
#   config/secrets/<固定文件名> → 这里的显式路径 → 旧默认（~/Desktop/Keys/...）
sources:                               # 需求雷达监控的增量源
  obsidian_raw: "~/Documents/Obsidian Vault/2 - raw"
  # Obsidian 管线四目录（按处理顺序）：1 - unprocessed（截图/录音导出落点）→
  # 2 - raw（= 上面的 obsidian_raw，雷达扫描源）→ 3 - change-summary（ingest
  # 变更日志）→ 4 - wiki（加工后的知识库）。下面三键缺省时自动由 obsidian_raw
  # 的上级目录（vault 根）+ 标准目录名派生，通常无需填写；也可在 App 设置窗口
  # 的"Obsidian 目录"小节编辑（写入 settings_overrides，优先级最高）。
  # ingest 脚本（screenpipe-export.sh / process-screenpipe.sh）同样遵守这些键
  # （经 `python3 -m act.lib.config --print-path` 解析，P1-6）。
  # obsidian_unprocessed: "~/Documents/Obsidian Vault/1 - unprocessed"
  # obsidian_change_summary: "~/Documents/Obsidian Vault/3 - change-summary"
  # obsidian_wiki: "~/Documents/Obsidian Vault/4 - wiki"
  # slack_token_path 可省略：推荐在 App 设置窗口粘贴保存（config/secrets/slack-user-token.txt）
  slack_token_path: "~/Desktop/Keys/slack-user-token.txt"  # user token xoxp-（读 DM/@提及需要；见 docs/SLACK_SETUP.md）
  slack_channels:                      # 这些频道里 @ 你才会建卡片（DM/群会全看）
    - id: C01234ABCDE                  # <your-team-channel>
      name: your-team-channel
    - id: C01234FGHIJ                  # <your-weekly-report-channel>（周报所在）
      name: your-weekly-report-channel
  slack_dms:
    - id: D01234ABCDE                  # manager DM
      name: manager
  slack_mcp_fallback: true             # 无 token 时改走 Slack MCP 只读兜底扫描（见 docs/SLACK_SETUP.md）
  slack_mcp_interval_minutes: 30       # MCP 兜底最小间隔（launchd 每 3 分钟触发，靠 state/slack_mcp.marker 节流）
  watch_people:                        # 这些人的消息/会议内容才触发需求提取
    # 第一项视为你的 manager（radar 用其 first-name token 识别会议记录里的提及）
    - your.manager
  # gmail:                             # Gmail 捕获（见 docs/GMAIL_SETUP.md）
  #   address: "your.name@gmail.com"
  #   enabled: true
  #   # app_password_path 可省略：推荐在 App 设置窗口粘贴保存
  #   # （config/secrets/gmail-app-password.txt）；旧默认 ~/Desktop/Keys/gmail-app-password.txt 仍兜底

approval:
  surface: slack                       # v0: slack（桌面+手机同一条消息）；v2+: mac-app
  poll_interval_minutes: 30
  cost_thresholds:
    show_cost_above_usd: 5             # 低于此值卡片不显示成本
    require_text_confirm_above_usd: 50 # 高于此值升 T2，需文字确认

# 手机指挥通道（CONTRACT §13 的指令面 + 通知镜像走哪个通道）：
#   none     = 默认。不启用 iMessage；Slack 侧维持现状（features.slack_radar 开
#              且有 token 时通知照旧镜像到 Slack self-DM，没配 token 则本来就是 no-op）
#   slack    = 显式选 Slack（行为与 none 完全相同，仅表达意图）
#   imessage = 没有 Slack 的用户用 iMessage"给自己发消息"线程做手机端：
#              批准/拒绝/打回/验收 R-xxx、快速捕获、👍/❤️ tapback 审批、🔔 通知镜像。
#              需要：下面的 imessage.self_handle + 给 python 授 Full Disk Access
#              （chat.db 只读轮询）。步骤见 docs/IMESSAGE_SETUP.md。仅 macOS。
phone_channel: none
# imessage:
#   self_handle: "+14155551234"        # 你自己的 iMessage handle：E.164 手机号或 iCloud 邮箱
#                                      # （必须和 Messages 里"给自己发消息"线程的收件人完全一致）

execution:
  dispatcher: claude-bg                # claude --bg 派发，claude agents --json 监控
  memory_inject: true                  # 注入 auto-memory program maps + 约束
  create_github_repo: false            # 默认关（v0.11 起）：批卡不静默在你的 GitHub 建私有 repo、推送源自屏幕/会议/邮件的内容——false = 仅本地 git init + 本地分支交付；设 true 才对 target_kind=new 自动 gh repo create --private 做 remote（draft PR 需要）
  auto_resume: true                    # 执行中任务的后台 agent 死掉（睡眠/断网/崩溃）时自动 claude --resume 拉起，带退避
  # skip_permissions: true             # 后台 agent 带 --dangerously-skip-permissions 无人值守跑（默认）；改 false 走 claude 正常权限模型，被挡住的 agent 会浮到 needs_input 等你确认
  quality_gate:
    self_check: true                   # 可运行检查 + 证据
    fresh_context_review: true         # 交付前 fresh-context 审 diff
  training:
    system_card_per_ckpt: true         # 强制：训前设计卡 + 训后结果回填

recording:                             # 屏幕采集的 sensitive-app 排除（隐私控制）
  # 命中的窗口在采集阶段就被录制引擎跳过（screenpipe --ignored-windows）——OCR/截图
  # 根本不会写入 ~/.screenpipe/db.sqlite；导出脚本（ingest/screenpipe-export.sh）还会
  # 用同一清单过滤引擎重启前已存的历史 frame。匹配规则：大小写不敏感的**子串**匹配，
  # 同时匹配 app 名和窗口标题。
  # 加银行等敏感 app：追加一行 `- <App 名或窗口标题关键词>`，如 `- Chase`、`- 招商银行`
  # （银行若在普通浏览器标签里打开，只有窗口标题含该关键词时才会被排除——见
  # docs/PRIVACY.md 残余风险）。进阶：支持引擎的 `App::Title` 定点语法——
  # `Slack::#hr` 只排除 Slack 里标题含 #hr 的窗口，`::标题` 只按窗口标题匹配。
  # 设为 `ignored_apps: []` = 明确关闭此过滤（不推荐）。
  # 改动后重启录制引擎生效：菜单栏切一次录制模式，或重启 App。
  ignored_apps:
    - 1Password
    - Bitwarden
    - LastPass
    - KeePassXC
    - Keychain Access
    - Private Browsing                 # Safari 无痕窗口（按窗口标题匹配）
    - Incognito                        # Chrome/Edge 无痕窗口（按窗口标题匹配）

trash:
  retention_days: 60                   # 回收站保留天数；超期且未标永久的硬删。设 0 = 永不自动清

integrations:
  jira: off                            # 默认关；开启后自动建票到 projectKey
  jira_project_key: ABC                # 换成你自己的 Jira project key

digest:
  weekly: monday                       # 周一 digest：低置信度疑似需求 + 卡住任务 + 双向欠账

# 执行落点：req 未指定 target_repo 时的兜底（paperwork/调研的家；绝不默认进你的代码 repo，如 your-bench-repo）
# raise/提取时 LLM 会按 ~/Projects 仓库清单主动选择 target_repo，这里只是最后兜底。
# execution.default_target_repo: "~/Projects/your-workbench"

redaction:                             # 发给 AI 前的本地脱敏
  enabled: false                       # 词表脱敏开关（默认关；打开会改变 AI 看到的内容，也可在 app 设置里切）
  terms_file: config/redaction_terms.txt  # 你的词表（一行一条，re: 前缀=正则）
  mask_secrets: true                   # 内置密钥/token 掩码（sk-ant-/xox*/AKIA/gh*_/PEM）；默认开且不依赖 enabled

# telemetry:                           # 匿名使用统计（**默认开**，见 docs/TELEMETRY.md 字段表）
#   enabled: false                     # 关掉即完全停止上传（App 设置「产品改进计划」也能关）
#   level: basic                       # basic=只有事件元数据（默认）；detailed=额外附 ≤200 字符指令/交付摘要（opt-in）
#   # 默认上传到维护者的 Supabase（内置 publishable key，RLS 只允许写入、读不回数据）。
#   # fork/自建收集端：换成你自己的项目 URL；置空 "" 则彻底禁用上传。
#   supabase_url: "https://xxxx.supabase.co"
#   # 自建收集端的 key 放 config/secrets/supabase-service-key.txt（0600），存在时优先于内置 key；
#   # 也可用 key_path 显式指定文件路径（解析顺序同 CONTRACT §19：secrets → key_path → 内置 key）
#   # key_path: "~/Desktop/Keys/supabase-service-key.txt"
