# Release: on push of a v* tag — verify the tag matches the source version, run all
# CI gates, package the .app with ditto, build the .pkg, generate SHA-256 checksums,
# attest build provenance, and publish a GitHub Release.
name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write # create the GitHub Release and upload assets
      id-token: write # OIDC token for the build provenance attestation
      attestations: write # persist the provenance attestation
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Verify tag matches act.__version__
        # Integrity gate — act/__init__.py is the version's source of truth. A tag
        # that doesn't match it would publish an app that self-reports the wrong
        # version (telemetry, bug reports). Fail fast, before the expensive build.
        run: |
          VERSION="$(python3 -c 'import act; print(act.__version__)')"
          if [ "v${VERSION}" != "${GITHUB_REF_NAME}" ]; then
            echo "::error::pushed tag ${GITHUB_REF_NAME} does not match act.__version__ (v${VERSION}) — bump act/__init__.py or re-tag"
            exit 1
          fi

      - name: Select newest Xcode
        # Match the recent toolchain the Swift sources target (see ci.yml).
        run: |
          XCODE="$(find /Applications -maxdepth 1 -type d -name 'Xcode*.app' | sort -V | tail -n1)"
          sudo xcode-select -s "$XCODE/Contents/Developer"
          swiftc --version

      - name: Install PyYAML
        # Fallback covers PEP 668 "externally managed" Pythons on the runner image.
        run: python3 -m pip install --user "pyyaml>=6,<7" || python3 -m pip install --user --break-system-packages "pyyaml>=6,<7"

      - name: Compile Python sources
        run: python3 -m compileall -q act ingest

      - name: Run unit tests
        run: AIASSISTANT_HOME=$(mktemp -d) python3 -m unittest discover -s tests

      - name: Import signing certificate (stable self-signed; optional)
        # Makes CI release builds sign with the SAME stable self-signed identity
        # as local builds, so macOS TCC grants (Screen Recording, etc.) PERSIST
        # across version updates instead of resetting on every ad-hoc rebuild.
        # Created + wired once by mac/scripts/make-signing-cert.sh.
        #
        # GitHub can't reference `secrets` in `if:`, so the guard is inside bash:
        # with no secret this step is a harmless no-op and build.sh falls back to
        # ad-hoc signing — a fork without the secret still builds fine.
        env:
          P12_B64: ${{ secrets.MACOS_SIGN_CERT_P12 }}
          P12_PASSWORD: ${{ secrets.MACOS_SIGN_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${P12_B64:-}" ]; then
            echo "no MACOS_SIGN_CERT_P12 secret — ad-hoc signing fallback (TCC grants reset on update)"
            exit 0
          fi
          IDENTITY="Zelin AI Engineer Dev"
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          P12_PATH="$RUNNER_TEMP/sign-cert.p12"

          # decode the cert (contents never printed)
          printf '%s' "$P12_B64" | base64 --decode > "$P12_PATH"

          # temp keychain, unlocked, prepended to the user search list (keep login.keychain-db)
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db

          # import + authorize codesign to use the key non-interactively
          security import "$P12_PATH" -k "$KEYCHAIN" -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null

          # fail LOUDLY if a misconfigured secret didn't actually yield the identity —
          # better a red build than a silently ad-hoc release that resets TCC grants.
          # No `-v`: the self-signed cert is untrusted (CSSMERR_TP_NOT_TRUSTED), which
          # `-v` (trusted-only) would hide even though it signs fine.
          if ! security find-identity -p codesigning | grep -q "$IDENTITY"; then
            echo "::error::signing cert secret present but identity '$IDENTITY' not found — check MACOS_SIGN_CERT_P12 / MACOS_SIGN_CERT_PASSWORD"
            security find-identity -p codesigning || true
            exit 1
          fi
          echo "signing identity '$IDENTITY' ready — build.sh will sign with it"

      - name: Vendor Sparkle (framework + tools)
        # Download + verify (SHA-256) + vendor Sparkle.framework and its bin/ tools
        # into mac/Frameworks/ (gitignored). MUST run before the build so build.sh
        # links + embeds + signs the framework and the appcast step can sign_update.
        run: bash mac/scripts/fetch-sparkle.sh

      - name: Build macOS app
        run: bash mac/build.sh

      - name: Package app bundle
        # ditto (not zip) preserves resource forks / bundle metadata correctly.
        # App name contains an apostrophe — always reference it via a quoted variable.
        run: |
          APP="Zelin's AI Assistant.app"
          ZIP="ZelinAIAssistant-${GITHUB_REF_NAME}-macos.zip"
          cd mac/build
          ditto -c -k --sequesterRsrc --keepParent "$APP" "$ZIP"

      - name: Build .pkg installer
        # Produces mac/build/ZelinAIAssistant-<version>.pkg (version from act/__init__.py).
        run: bash mac/package.sh

      - name: Stage release assets
        # Rename the pkg to match the tag so both assets share one naming scheme
        # (the tag gate above guarantees v$VERSION == $GITHUB_REF_NAME).
        run: |
          VERSION="$(python3 -c 'import act; print(act.__version__)')"
          mv "mac/build/ZelinAIAssistant-${VERSION}.pkg" "mac/build/ZelinAIAssistant-${GITHUB_REF_NAME}.pkg"

      - name: EdDSA-sign the .pkg and generate appcast.xml
        # Sparkle integrity: EdDSA-sign the .pkg with the maintainer's private key
        # (GitHub secret; never in the repo) and emit a single-item appcast.xml
        # whose enclosure is the .pkg (installationType="package" — updates the
        # whole product, app + pipeline, no drift). Guarded on the secret so a fork
        # without it fails loudly rather than shipping an unusable feed.
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SPARKLE_ED_PRIVATE_KEY:-}" ]; then
            echo "::error::SPARKLE_ED_PRIVATE_KEY secret missing — auto-update assets not produced"; exit 1
          fi
          TAG="${GITHUB_REF_NAME}"                      # e.g. v0.23.0
          VER="${TAG#v}"                                # 0.23.0  (== CFBundleVersion)
          PKG="mac/build/ZelinAIAssistant-${TAG}.pkg"
          KEYFILE="$RUNNER_TEMP/sparkle_ed_priv"
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$KEYFILE"

          # sign_update prints:  sparkle:edSignature="…" length="…"
          SIGATTR="$(mac/Frameworks/bin/sign_update "$PKG" -f "$KEYFILE")"
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/ZelinAIAssistant-${TAG}.pkg"

          cat > mac/build/appcast.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>Zelin's AI Assistant</title>
              <item>
                <title>${VER}</title>
                <sparkle:version>${VER}</sparkle:version>
                <sparkle:shortVersionString>${VER}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>14.0.0</sparkle:minimumSystemVersion>
                <sparkle:releaseNotesLink>https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}</sparkle:releaseNotesLink>
                <pubDate>$(date -u +"%a, %d %b %Y %H:%M:%S +0000")</pubDate>
                <enclosure url="${URL}"
                           sparkle:installationType="package"
                           ${SIGATTR}
                           type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          EOF
          echo "generated appcast.xml:"; cat mac/build/appcast.xml

      - name: Package portable Linux + Windows bundles
        # Windows/Linux are pure Python (no compiled binary), so each "installer"
        # is a self-contained source archive + the platform install script. Emits
        # dist/ZelinAIAssistant-<tag>-linux.tar.gz and -windows.zip. Independent of
        # the macOS signing/Sparkle steps above. See scripts/package-portable.sh.
        run: bash scripts/package-portable.sh "${GITHUB_REF_NAME}"

      - name: Generate SHA-256 checksums
        # One checksums file covering all four assets, written with BARE filenames
        # (mac assets live in mac/build/, portable archives in dist/) so a user who
        # downloads the assets into one flat dir can verify with:
        #   shasum -a 256 -c checksums.sha256 --ignore-missing
        run: |
          set -euo pipefail
          MB="mac/build"
          {
            ( cd "$MB" && shasum -a 256 \
                "ZelinAIAssistant-${GITHUB_REF_NAME}-macos.zip" \
                "ZelinAIAssistant-${GITHUB_REF_NAME}.pkg" )
            ( cd dist && shasum -a 256 \
                "ZelinAIAssistant-${GITHUB_REF_NAME}-linux.tar.gz" \
                "ZelinAIAssistant-${GITHUB_REF_NAME}-windows.zip" )
          } > "$MB/checksums.sha256"
          cat "$MB/checksums.sha256"

      - name: Attest build provenance
        # Publishes SLSA provenance tying both assets to this workflow run.
        # Users verify with: gh attestation verify <file> --repo Wan-ZL/zelin-ai-assistant
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3.0.0
        with:
          subject-path: |
            mac/build/ZelinAIAssistant-*-macos.zip
            mac/build/ZelinAIAssistant-*.pkg
            dist/ZelinAIAssistant-*-linux.tar.gz
            dist/ZelinAIAssistant-*-windows.zip

      - name: Create GitHub Release and upload assets
        # The install-steps block is prepended to the auto-generated notes
        # (gh appends --generate-notes output after --notes-file). It exists
        # because the pkg is UNSIGNED (no Developer ID yet): without the
        # three-click bypass spelled out next to the download, macOS Sequoia
        # shows only "Done / Move to Trash" and users conclude the app is
        # malware. Remove the Gatekeeper paragraph once builds are signed
        # and notarized.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ZIP="mac/build/ZelinAIAssistant-${GITHUB_REF_NAME}-macos.zip"
          PKG="mac/build/ZelinAIAssistant-${GITHUB_REF_NAME}.pkg"
          LINUX="dist/ZelinAIAssistant-${GITHUB_REF_NAME}-linux.tar.gz"
          WIN="dist/ZelinAIAssistant-${GITHUB_REF_NAME}-windows.zip"
          cat > /tmp/release-notes.md <<'NOTES'
          ## 安装 / Install

          ### macOS

          下载下方的 `ZelinAIAssistant-*.pkg` 双击安装。装完后菜单栏会自动出现小图标（首启弹权限设置页）。

          **这个安装包目前没有 Apple 开发者签名**，所以 macOS 第一次会拦下它说"无法打开"。这不是故障，也不是恶意软件——用 3 步绕过（只需做这一次）：

          1. 在 Finder 里**右键点击** .pkg 文件 → 选「打开」；
          2. 弹窗里再点一次「打开」；
          3. 如果 macOS Sequoia 仍然拒绝：打开 系统设置 → 隐私与安全性，拉到底部，点「仍要打开」，输一次密码。

          Download `ZelinAIAssistant-*.pkg` below and double-click it. The build is **not yet signed with an Apple Developer ID**, so macOS blocks the first open — expected, not malware. Bypass it once: **right-click the .pkg in Finder → Open → Open**; if macOS Sequoia still refuses, go to System Settings → Privacy & Security, scroll to the bottom, click **Open Anyway** and enter your password.

          ### Windows / Linux

          Windows 和 Linux 是纯 Python（无需编译）。下载对应的源码包，解压，然后从解压出的目录里运行安装脚本：

          - **Windows**：下载 `ZelinAIAssistant-*-windows.zip`，解压后运行 `install.ps1`（指南：[docs/WINDOWS.md](https://github.com/Wan-ZL/zelin-ai-assistant/blob/main/docs/WINDOWS.md)）。
          - **Linux**：下载 `ZelinAIAssistant-*-linux.tar.gz`，解压后运行 `bash install-linux.sh`（指南：[docs/LINUX.md](https://github.com/Wan-ZL/zelin-ai-assistant/blob/main/docs/LINUX.md)）。

          Windows and Linux are pure Python (no build step). Download the matching source bundle, unpack it, and run the install script from the extracted folder:

          - **Windows**: download `ZelinAIAssistant-*-windows.zip`, extract, run `install.ps1` — see [docs/WINDOWS.md](https://github.com/Wan-ZL/zelin-ai-assistant/blob/main/docs/WINDOWS.md).
          - **Linux**: download `ZelinAIAssistant-*-linux.tar.gz`, unpack, run `bash install-linux.sh` — see [docs/LINUX.md](https://github.com/Wan-ZL/zelin-ai-assistant/blob/main/docs/LINUX.md).

          完整安装指南 / full install guide: [docs/INSTALL.md](https://github.com/Wan-ZL/zelin-ai-assistant/blob/main/docs/INSTALL.md) · 卸载 / uninstall: `bash uninstall.sh`

          NOTES
          gh release create "$GITHUB_REF_NAME" --notes-file /tmp/release-notes.md --generate-notes --latest
          gh release upload "$GITHUB_REF_NAME" "$ZIP" "$PKG" "$LINUX" "$WIN" mac/build/checksums.sha256 mac/build/appcast.xml

      - name: Clean up signing keychain
        # Runs even if an earlier step failed: never leave the decoded cert or
        # the temp keychain on the runner. No-op when signing wasn't configured.
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain-db" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/sign-cert.p12" 2>/dev/null || true
          # never leave the decoded Sparkle EdDSA private key on the runner
          rm -f "$RUNNER_TEMP/sparkle_ed_priv" 2>/dev/null || true
          # restore the default user keychain search list
          security list-keychains -d user -s login.keychain-db 2>/dev/null || true
