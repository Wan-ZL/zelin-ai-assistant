# CI: lint gates (shellcheck + ruff), Python 3.9 floor tests, compile check,
# unit tests, and one macOS job (macOS runners are expensive — everything
# Apple-flavored lives in it: mac app build WITH Sparkle, shared-contract
# Swift tests, the Swift↔Python crypto interop gate, and the iOS simulator
# build) — on every pull request and push to main.
name: CI

on:
  pull_request:
  push:
    branches: [main]

# Every job only reads the repo — no job creates releases, comments, or pushes.
permissions:
  contents: read

# Cancel superseded runs on the same PR/branch (never cancels main pushes mid-run).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint (shellcheck + ruff)
    # Runs on ubuntu in parallel with the macOS build job — shellcheck is
    # preinstalled on the ubuntu runner image.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # no step pushes or uses git auth after checkout — don't leave the
          # token in .git/config for later steps to read
          persist-credentials: false

      - name: shellcheck all tracked shell scripts
        run: |
          shellcheck --version
          git ls-files -z '*.sh' | xargs -0 shellcheck

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.x"

      - name: Install ruff
        # Exact pin so a ruff upgrade is a deliberate PR, not a surprise CI failure.
        run: python3 -m pip install ruff==0.15.20

      - name: ruff check
        # Rule set lives in ruff.toml at the repo root.
        run: ruff check .

  tests-linux:
    name: Tests on ubuntu (Python ${{ matrix.python-version }})
    # README/docs promise Python 3.9+ and docs/PORTING.md promises the headless
    # core runs on Linux — same suite on the documented floor (3.9) and on
    # current python. The act pipeline is pure Python + PyYAML (tests inject
    # fake runners instead of shelling out); darwin-only paths guard themselves
    # behind the OS seam (act/lib/platform.py) instead of failing here.
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.x"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # no step pushes or uses git auth after checkout — don't leave the
          # token in .git/config for later steps to read
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install PyYAML
        run: python3 -m pip install "pyyaml>=6,<7"

      - name: Compile Python sources
        run: python3 -m compileall -q act ingest

      - name: Run unit tests
        run: AIASSISTANT_HOME=$(mktemp -d) python3 -m unittest discover -s tests

  tests-windows:
    name: Tests on windows (Python ${{ matrix.python-version }})
    # The act pipeline is pure Python + PyYAML; running the same suite on Windows
    # catches real path/OS bugs and is the cross-platform CI foundation (see
    # docs/LINUX.md). POSIX-only checks (file modes, launchd/cron, shell-shim
    # resolution) guard themselves with sys.platform / os.name and are skipped
    # here — never deleted. Windows service wiring (Task Scheduler) is a later
    # port; this job only proves the portable core imports + runs on Windows.
    #
    # INFORMATIONAL for now: the Windows suite has never actually run, so its
    # first CI runs may surface path/OS bugs. continue-on-error keeps a red
    # Windows run from failing the workflow / blocking PRs until it's driven
    # green — flip this off once Windows is reliably passing.
    continue-on-error: true
    runs-on: windows-latest
    defaults:
      run:
        # Git Bash is preinstalled on the windows runner — run the ubuntu
        # commands verbatim so the three jobs stay in lockstep.
        shell: bash
    strategy:
      matrix:
        python-version: ["3.9", "3.x"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # no step pushes or uses git auth after checkout — don't leave the
          # token in .git/config for later steps to read
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install PyYAML
        run: python -m pip install "pyyaml>=6,<7"

      - name: Compile Python sources
        run: python -m compileall -q act ingest

      - name: Run unit tests
        # tests/__init__.py points AIASSISTANT_HOME at a throwaway tmp dir before
        # any act import, so the sandbox is hermetic on Windows too.
        env:
          AIASSISTANT_HOME: ${{ runner.temp }}
        run: python -m unittest discover -s tests

  ci:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # no step pushes or uses git auth after checkout — don't leave the
          # token in .git/config for later steps to read
          persist-credentials: false

      - name: Select newest Xcode
        # The Swift sources target a recent toolchain (local dev builds on Swift 6.2 /
        # macOS 26 SDK); older default Xcodes fail on main-actor isolation rules.
        run: |
          XCODE="$(find /Applications -maxdepth 1 -type d -name 'Xcode*.app' | sort -V | tail -n1)"
          sudo xcode-select -s "$XCODE/Contents/Developer"
          swiftc --version

      - name: Install PyYAML + cryptography
        # Fallback covers PEP 668 "externally managed" Pythons on the runner image.
        # cryptography is act/lib/e2e.py's lazy dependency, exercised by the
        # Swift↔Python interop gate below.
        run: python3 -m pip install --user "pyyaml>=6,<7" cryptography || python3 -m pip install --user --break-system-packages "pyyaml>=6,<7" cryptography

      - name: Compile Python sources
        run: python3 -m compileall -q act ingest

      - name: Run unit tests
        run: AIASSISTANT_HOME=$(mktemp -d) python3 -m unittest discover -s tests

      - name: Verify iOS MARKETING_VERSION matches act.__version__
        # act/__init__.py is the version single source of truth. The Mac app is
        # stamped from it at build time (mac/build.sh), but Xcode builds the iOS
        # target straight from the committed project, so its MARKETING_VERSION
        # is a pin (ios/project.yml + pbxproj) that WILL silently drift on
        # version bumps unless this gate forces the sync — an iOS app
        # self-reporting a years-old version makes device-side triage useless.
        run: |
          set -euo pipefail
          VERSION="$(sed -n 's/^__version__ = "\([^"]*\)".*/\1/p' act/__init__.py)"
          [ -n "$VERSION" ] || { echo "::error::could not read __version__ from act/__init__.py"; exit 1; }
          for f in ios/project.yml ios/ZelinAIAssistant.xcodeproj/project.pbxproj; do
            PINS="$(grep 'MARKETING_VERSION' "$f")" || { echo "::error file=$f::no MARKETING_VERSION found — project layout changed, update this gate"; exit 1; }
            if printf '%s\n' "$PINS" | grep -vF "$VERSION"; then
              echo "::error file=$f::iOS MARKETING_VERSION out of sync (lines above) — bump it to $VERSION in ios/project.yml AND ios/ZelinAIAssistant.xcodeproj/project.pbxproj (2 places) alongside act/__init__.py"
              exit 1
            fi
          done
          echo "iOS MARKETING_VERSION == $VERSION (project.yml + pbxproj)"

      - name: Vendor Sparkle (framework + tools)
        # Release builds link Sparkle (release.yml runs this same SHA-pinned
        # script). Without it here, every `#if canImport(Sparkle)` block
        # (updater wiring + the Settings update UI) compiles OUT of PR CI, so
        # a symbol break inside those blocks merges green and only explodes at
        # tag time — after the tag already exists.
        run: bash mac/scripts/fetch-sparkle.sh

      - name: Build macOS app (with Sparkle, like a release build)
        run: bash mac/build.sh

      - name: Swift contract tests (shared/Sources, plain swiftc)
        # Behavior tests for the lossy dashboard.json row decode (Contract.swift)
        # and the board-lane merge/badge logic (BoardModel.swift) — shared logic
        # both apps compile but nothing else executes. No Xcode project needed.
        run: bash ios/tests/contract/run.sh

      - name: Swift↔Python E2E crypto interop
        # The ONLY check that ios/Sources/E2E.swift byte-interops with
        # act/lib/e2e.py (tests/test_e2e.py is Python↔Python only): the frozen
        # ZSYN/ZQR1 wire contract between the pipeline and the phone, both
        # directions. Plain swiftc + CryptoKit — no Xcode project needed.
        run: bash ios/tests/interop/run.sh

      - name: Build iOS app (simulator, no signing)
        # ios/Sources was previously compiled by NO workflow — an iOS-only (or
        # shared-contract-used-only-by-iOS) break merged green and surfaced at
        # the maintainer's next manual Xcode open. Builds the committed project
        # (canonical spec: ios/project.yml; the pbxproj is kept in sync, so CI
        # needs no xcodegen). Simulator destination → no signing identity.
        run: |
          set -euo pipefail
          xcodebuild -project ios/ZelinAIAssistant.xcodeproj \
                     -scheme ZelinAIAssistant \
                     -destination 'generic/platform=iOS Simulator' \
                     CODE_SIGNING_ALLOWED=NO \
                     build
